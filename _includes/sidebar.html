<!-- Sidebar -->
	<div id="sidebar" class="4u sidebar">
		{% for post in site.posts offset: 0 limit: 3 %}
		<section>
			<header class="major">
				<h2><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></h2>
			</header>
			<div class="image fit"><a href="{{ site.baseurl }}{{ post.url }}"><img src="{{ site.baseurl }}/assets/{{ post.featured }}" alt="" class="post"></a></div>
		</section>
		{% endfor %}
	</div>
