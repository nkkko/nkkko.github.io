---
layout: default
---

<!-- Header -->
			<div id="header">
				<div class="container">

					{% include nav.html %}

					<!-- Banner -->
						<div id="banner">
							<div class="container">
								<section>
									<header class="major">
										<h2>Innovantage</h2>
										<span class="byline">partnersko stvaranje korisnih proizvoda i usluga na globalnom tržištu</span>
									</header>
									<a href="#zelimvise" class="button alt">Želim više!</a>
								</section>
							</div>
						</div>

				</div>
			</div>

		<!-- Featured -->
			<div class="wrapper style2">
				<section class="container">
					<header class="major">
					</header>
					<div class="row no-collapse-1">
						{% for post in site.posts offset: 0 limit: 3 %}
						<section class="4u">
							<a href="{{ site.baseurl }}{{ post.url }}" class="image feature"><img src="{{ site.baseurl }}/assets/{{ post.featured }}" alt=""></a>
							<p>{{ post.title }}</p>
						</section>
						{% endfor %}
					</div>
				</section>
			</div>

	{{ content }}
